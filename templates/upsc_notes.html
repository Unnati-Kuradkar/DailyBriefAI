<!DOCTYPE html>
<html>

<head>
    <title>DailyBriefAI UPSC Notes</title>

    <link rel="stylesheet"
          href="{{ url_for('static', filename='style.css') }}">
</head>

<body>

<div class="container">

    <h1>📚 UPSC Current Affairs Notes</h1>

    <a href="/" class="btn">
        ← Back Home
    </a>

    <a href="/download_upsc_notes_pdf" class="btn">
        📄 Download UPSC Notes PDF
    </a>

    <br><br>

    {% for article in news %}

    <div class="card">

        <h2>
            {{ article[1] }}
        </h2>

        <p>
            <strong>Category:</strong>
            {{ article[5] }}
        </p>

        <h3>📝 Important Notes</h3>

        <ul>
            <li>{{ article[2] }}</li>
        </ul>

        <h3>🎯 Exam Relevance</h3>

        <p>
            Useful for UPSC Prelims,
            Mains, SSC, Banking and
            other Competitive Exams.
        </p>

    </div>

    {% endfor %}

</div>

</body>
</html>
